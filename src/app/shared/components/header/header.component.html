<header class="app-header">
  <div class="header-inner">

    <!-- ── Logo ─────────────────────────────────────────────────── -->
    <a class="logo-link" routerLink="/home">
      <!-- Reemplaza este bloque con tu logo cuando esté listo -->
      <div class="logo-placeholder">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" class="logo-icon">
          <rect x="2" y="8" width="32" height="24" rx="2" stroke="#DDA853" stroke-width="2.5"/>
          <rect x="7" y="14" width="7" height="7" rx="1" fill="#DDA853" opacity="0.8"/>
          <rect x="20" y="14" width="7" height="7" rx="1" fill="#DDA853" opacity="0.8"/>
          <path d="M14 21h8" stroke="#DDA853" stroke-width="2" stroke-linecap="round"/>
          <path d="M14 8V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v3" stroke="#DDA853" stroke-width="2"/>
        </svg>
        <!-- ↓ img tag lista para cuando tengas el logo ↓ -->
        <!-- <img src="assets/logo.svg" alt="MG Magic Doors" height="36" /> -->
        <span class="logo-text">MG</span>
      </div>
    </a>

    <!-- ── Nav + Hamburger ────────────────────────────────────────── -->
    <div class="header-nav-wrapper">
      <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
        <span class="material-symbols-rounded">{{ menuOpen() ? 'close' : 'menu' }}</span>
      </button>

      <nav class="main-nav" [class.open]="menuOpen()">
        @for (item of visibleNav(); track item.route) {
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            (click)="closeAll()"
          >
            <span class="material-symbols-rounded nav-icon">{{ item.icon }}</span>
            {{ item.label }}
          </a>
        }
      </nav>
    </div>

    <!-- ── User Menu ─────────────────────────────────────────────── -->
    <div class="user-menu-wrapper">
      <button class="user-btn" (click)="toggleUserMenu()" [class.open]="userMenuOpen()">
        <div class="avatar">{{ user()?.avatarInitials ?? '??' }}</div>
        <span class="material-symbols-rounded chevron">expand_more</span>
      </button>

      @if (userMenuOpen()) {
        <div class="user-dropdown">
          <div class="user-info">
            <div class="avatar avatar-lg">{{ user()?.avatarInitials ?? '??' }}</div>
            <div>
              <p class="user-name">{{ user()?.name }}</p>
              <p class="user-email">{{ user()?.email }}</p>
              <span class="role-chip">{{ user()?.role === 'admin' ? 'Administrador' : 'Usuario' }}</span>
            </div>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-action logout-btn" (click)="logout()">
            <span class="material-symbols-rounded">logout</span>
            Cerrar sesión
          </button>
        </div>
      }
    </div>

  </div>
</header>
